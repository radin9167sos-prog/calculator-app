<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1>My To-Do List</h1>
            
            <div class="input-container">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="addBtn" class="btn-add">Add Task</button>
            </div>
            
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            
            <ul id="todoList" class="todo-list"></ul>
            
            <div class="stats">
                <span>Total: <strong id="totalTasks">0</strong></span>
                <span>Active: <strong id="activeTasks">0</strong></span>
                <span>Completed: <strong id="completedTasks">0</strong></span>
            </div>
            
            <button id="clearBtn" class="btn-clear-all">Clear Completed</button>
        </div>
    </div>
    
    <script src="todo-script.js"></script>
</body>
</html>
